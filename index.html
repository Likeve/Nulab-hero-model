<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 西林瓶 - 前卫生化质感</title>
    <style>
        body {
            margin: 0;
            overflow-x: hidden;
            background: #000000; /* 纯黑背景 (Dark Mode) */
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        .hero-section {
            width: 100%;
            max-width: none;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            height: 100vh;
            padding: 0;
            box-sizing: border-box;
            position: relative;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            max-width: 100%;
            position: relative;
            cursor: grab;
        }
        #canvas-container:active {
            cursor: grabbing;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            letter-spacing: 3px;
            color: #ffffff; /* Dark Mode 下改为纯白 */
            text-transform: uppercase;
            transition: opacity 0.5s ease;
            z-index: 20;
        }

        /* 响应式：小屏仍占满视口 */
        @media (max-width: 810px) {
            .hero-section {
                min-height: 100dvh;
                height: 100dvh;
            }
        }
    </style>
</head>
<body>
    <!-- 入场阶段画布 CSS 动态模糊（feGaussianBlur，随 GSAP 淡出） -->
    <svg xmlns="http://www.w3.org/2000/svg" style="width:0;height:0;position:absolute;" aria-hidden="true">
        <defs>
            <filter id="motion-blur" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur id="blur-filter" in="SourceGraphic" stdDeviation="0 0" />
            </filter>
        </defs>
    </svg>

    <div id="loading"></div>
    <div class="hero-section">
        <div id="canvas-container"></div>
    </div>

    <!-- 引入 GSAP 动画库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <!-- 引入 lil-gui 用于控制参数 -->
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.1/dist/lil-gui.umd.min.js"></script>

    <!-- Import maps polyfill for older browsers -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TrackballControls } from 'three/addons/controls/TrackballControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        let camera, scene, renderer, controls;

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            // 1. 初始化渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(container.clientWidth, container.clientHeight);
            
            // 色调映射与曝光，营造高级摄影质感
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 2.0;
            
            // 启用阴影
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // 2. 场景设置
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000); // 【关键修复】为场景指定纯黑物理背景，解决开启 alpha 时 Transmission 材质通道混合导致发白发雾的 WebGL 渲染 Bug
            
            // 3. 相机设置 - 略带长焦感(35mm)，减少透视畸变，更显严谨和冷静
            camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 0, 8);

            // 4. 环境光与反射 (切换为暗调偏柔和的摄影棚 HDRI)
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            pmremGenerator.compileEquirectangularShader();
            
            // 环境光配置 (需要提前定义以便加载器访问)
            const envSettings = {
                rotationX: 0,
                rotationY: 0,
                enableHDRI: true
            };

            let envMapTexture = null;
            new RGBELoader()
                .setDataType(THREE.FloatType)
                .load('parking_garage_1k.hdr', function (texture) {
                    // 黑科技：在内存中强行将 HDR 转换为黑白，消除米黄色光害
                    const data = texture.image.data;
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                        data[i] = lum;
                        data[i + 1] = lum;
                        data[i + 2] = lum;
                    }
                    texture.needsUpdate = true;

                    envMapTexture = pmremGenerator.fromEquirectangular(texture).texture;
                    if (envSettings.enableHDRI) {
                        scene.environment = envMapTexture;
                    }
                    
                    // 适当提升曝光度，确保在暗调环境下能清晰看清标签上的文字，同时保持整体深邃感
                    renderer.toneMappingExposure = 2.0; 

                    // 释放内存
                    texture.dispose();
                    pmremGenerator.dispose();
                });
            
            // 优化摄影棚布光：大幅提亮环境补光，解决阴影区死黑的问题
            // 天光保持纯白，地面反光颜色从极暗的 0x111111 提亮到中灰色 0x666666，强度提升到 1.5，让暗部细节透出来
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x666666, 1.5); 
            scene.add(hemiLight);

            // 添加一盏微弱的正面主光源，专门用来照亮正面标签上的文字
            const frontLight = new THREE.DirectionalLight(0xffffff, 1.2);
            frontLight.position.set(0, 0, 5); // 从正前方打光
            scene.add(frontLight);

            // 再额外增加一个微弱的全局环境光，作为最终托底，确保无论怎么转都不会有纯黑的死角
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            // 5. 交互控制器 (TrackballControls，实现全方位无死角斜向自由拖拽，就像把玩实物一样)
            controls = new TrackballControls(camera, renderer.domElement);
            controls.rotateSpeed = 3.0;
            controls.noZoom = true; // 禁止缩放
            controls.noPan = true; // 禁止平移
            controls.staticMoving = false; // 关闭静态移动，也就是开启阻尼顺滑效果
            controls.dynamicDampingFactor = 0.04; // 阻尼力度

            // 由于 TrackballControls 默认没有 autoRotate，我们自己接管自动旋转逻辑
            let isDragging = false;
            let isResetting = false;
            let resetTweenPos = null;
            let resetTweenUp = null;

            controls.addEventListener('start', () => { 
                isDragging = true; 
                isResetting = false;
                if (resetTweenPos) resetTweenPos.kill();
                if (resetTweenUp) resetTweenUp.kill();
            });

            controls.addEventListener('end', () => { 
                isDragging = false; 
                isResetting = true;

                // 释放鼠标后，使用 GSAP 平滑地将相机恢复到默认初始状态
                // 关键修复：不能直接用 GSAP 线性修改 x, y, z，那会让相机走“直线捷径”穿过模型内部，导致视觉上瞬间放大穿模。
                // 必须使用球面插值 (Slerp) 或保持半径，让相机沿着圆弧轨迹飞回。
                let dummy = { t: 0 };
                let startPos = camera.position.clone();
                let targetPos = new THREE.Vector3(0, 0, 8); // 默认初始位置
                let startUp = camera.up.clone();
                let targetUp = new THREE.Vector3(0, 1, 0);  // 默认向上的向量
                let radius = startPos.length(); // 保持拖拽时的当前半径

                resetTweenPos = gsap.to(dummy, {
                    t: 1,
                    duration: 2.5, // 回弹时间延长，动作更缓慢优雅
                    ease: "power4.out", // 极强的缓出曲线，让运动一开始快，然后在靠近原点时非常缓慢地减速停下
                    onUpdate: () => {
                        // 使用 lerp 后再 normalize() 乘上半径，这在数学上等同于完美的球面圆弧运动，确保相机和模型的距离永远恒定！
                        camera.position.copy(startPos).lerp(targetPos, dummy.t).normalize().multiplyScalar(radius);
                        camera.up.copy(startUp).lerp(targetUp, dummy.t).normalize();
                        camera.lookAt(0, 0, 0);
                    },
                    onComplete: () => { isResetting = false; }
                });
            });
            
            // 将 autoRotate 状态暴露给全局，方便在 animate 中访问
            window._autoRotateSettings = {
                enabled: true,
                speed: -0.8,
                isDragging: () => isDragging,
                isResetting: () => isResetting
            };

            // ==========================================
            // 调试面板 (lil-gui) — 已关闭：恢复时删除下一行 `let gui = null`，并取消 GUI_RESTORE_BLOCK_A / _B / _C 三处块注释（须一并恢复）
            // ==========================================
            let gui = null;

            /* GUI_RESTORE_BLOCK_A 光照与环境（恢复时去掉本行与对应闭合行的星杠注释）
            const gui = new lil.GUI({ title: '光照与环境控制' });
            
            // 全局曝光
            gui.add(renderer, 'toneMappingExposure', 0, 3).name('全局曝光度 (Exposure)');

            // 环境光旋转 (HDRI)
            const envFolder = gui.addFolder('HDRI 环境光 (Environment)');
            envFolder.add(envSettings, 'enableHDRI').name('开启 HDRI').onChange((val) => {
                if (val && envMapTexture) {
                    scene.environment = envMapTexture;
                } else {
                    scene.environment = null;
                }
            });
            envFolder.add(envSettings, 'rotationY', -Math.PI, Math.PI).name('HDRI 水平旋转').onChange((val) => {
                scene.environmentRotation.y = val;
            });
            envFolder.add(envSettings, 'rotationX', -Math.PI, Math.PI).name('HDRI 上下旋转').onChange((val) => {
                scene.environmentRotation.x = val;
            });

            // 底部补光 (HemisphereLight)
            const hemiFolder = gui.addFolder('底部补光 (HemiLight)');
            hemiFolder.add(hemiLight, 'visible').name('开启/关闭');
            hemiFolder.add(hemiLight, 'intensity', 0, 5).name('强度');
            
            // 正面高光 (DirectionalLight)
            const dirFolder = gui.addFolder('正面主光 (FrontLight)');
            dirFolder.add(frontLight, 'visible').name('开启/关闭');
            dirFolder.add(frontLight, 'intensity', 0, 5).name('强度');
            dirFolder.add(frontLight.position, 'x', -10, 10).name('位置 X');
            dirFolder.add(frontLight.position, 'y', -10, 10).name('位置 Y');
            dirFolder.add(frontLight.position, 'z', -10, 10).name('位置 Z');
            
            // 全局基础托底光 (AmbientLight)
            const ambFolder = gui.addFolder('全局兜底光 (AmbientLight)');
            ambFolder.add(ambientLight, 'visible').name('开启/关闭');
            ambFolder.add(ambientLight, 'intensity', 0, 2).name('强度');
            */

            // 生成横向拉丝纹理（程序化生成，用作粗糙度和凹凸贴图，完美规避接缝色块又提供物理拉丝感）
            // 增强：加入了更多的随机短横线和颗粒微小瑕疵，使其更有手工拉丝和真实金属的随机感
            function generateBrushedTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 1024;
                canvas.height = 1024;
                const context = canvas.getContext('2d');
                
                // 基础中性灰
                context.fillStyle = '#808080';
                context.fillRect(0, 0, 1024, 1024);
                
                // 1. 绘制主体长横向金属丝划痕
                for (let i = 0; i < 8000; i++) {
                    const isLight = Math.random() > 0.5;
                    const alpha = Math.random() * 0.12; // 稍微提升长丝的透明度对比
                    context.fillStyle = isLight ? `rgba(255,255,255,${alpha})` : `rgba(0,0,0,${alpha})`;
                    
                    const y = Math.random() * 1024;
                    const x = Math.random() * 1024;
                    const width = 200 + Math.random() * 800; // 横向细长
                    const height = Math.random() * 1.5; // 极细的划痕高度
                    
                    context.fillRect(x, y, width, height);
                }

                // 2. 绘制短促的、随机的横向断丝（增强随机不平整感）
                for (let i = 0; i < 15000; i++) {
                    const isLight = Math.random() > 0.5;
                    const alpha = Math.random() * 0.15; // 短丝对比度更强一点
                    context.fillStyle = isLight ? `rgba(255,255,255,${alpha})` : `rgba(0,0,0,${alpha})`;
                    
                    const y = Math.random() * 1024;
                    const x = Math.random() * 1024;
                    const width = 5 + Math.random() * 40; // 短促的横线
                    const height = Math.random() * 2.0; 
                    
                    context.fillRect(x, y, width, height);
                }

                // 3. 绘制金属表面微小的随机颗粒瑕疵点 (noise)
                for (let i = 0; i < 30000; i++) {
                    const isLight = Math.random() > 0.5;
                    const alpha = Math.random() * 0.18; // 颗粒点要有足够的深度/凸起感
                    context.fillStyle = isLight ? `rgba(255,255,255,${alpha})` : `rgba(0,0,0,${alpha})`;
                    
                    const y = Math.random() * 1024;
                    const x = Math.random() * 1024;
                    const size = Math.random() * 1.5; // 点状噪点
                    
                    context.fillRect(x, y, size, size);
                }

                // 4. 绘制少量的斜向/随机角度的较深物理划痕，增强破损和使用痕迹感
                for (let i = 0; i < 400; i++) {
                    const isLight = Math.random() > 0.5;
                    const alpha = Math.random() * 0.3; // 划痕对比度更高
                    context.strokeStyle = isLight ? `rgba(255,255,255,${alpha})` : `rgba(0,0,0,${alpha})`;
                    context.lineWidth = Math.random() * 2.0; // 划痕有粗细变化
                    
                    context.beginPath();
                    const startX = Math.random() * 1024;
                    const startY = Math.random() * 1024;
                    context.moveTo(startX, startY);
                    
                    // 划痕长度和略微倾斜的角度
                    const length = 10 + Math.random() * 150;
                    const angle = (Math.random() - 0.5) * 0.6; // 在水平方向上下产生最高约17度的随机倾斜
                    context.lineTo(startX + Math.cos(angle) * length, startY + Math.sin(angle) * length);
                    context.stroke();
                }
                
                const texture = new THREE.CanvasTexture(canvas);
                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.RepeatWrapping;
                texture.repeat.set(4, 2); // 增加UV重复采样，使丝线更密集细长
                return texture;
            }

            // 生成玻璃微小瑕疵/噪点贴图 (用作玻璃表面的微弱物理凹凸，增加真实感)
            function generateNoiseTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const context = canvas.getContext('2d');
                
                // 基础平滑中性灰
                context.fillStyle = '#808080';
                context.fillRect(0, 0, 512, 512);
                
                // 绘制随机噪点瑕疵
                for (let i = 0; i < 40000; i++) {
                    const isLight = Math.random() > 0.5;
                    const alpha = Math.random() * 0.15; // 极微弱的噪点强度
                    context.fillStyle = isLight ? `rgba(255,255,255,${alpha})` : `rgba(0,0,0,${alpha})`;
                    
                    const y = Math.random() * 512;
                    const x = Math.random() * 512;
                    const size = Math.random() * 1.5; // 极小的瑕疵点
                    
                    context.fillRect(x, y, size, size);
                }

                // 添加玻璃表面的随机长划痕瑕疵（磨损感）
                for (let i = 0; i < 300; i++) {
                    const alpha = Math.random() * 0.25; // 划痕较噪点稍强
                    context.strokeStyle = `rgba(255,255,255,${alpha})`; // 玻璃划痕通常是发白的微凹/反光
                    context.lineWidth = 0.5 + Math.random() * 1.5; // 粗细不均的划痕
                    
                    context.beginPath();
                    const startX = Math.random() * 512;
                    const startY = Math.random() * 512;
                    context.moveTo(startX, startY);
                    
                    // 玻璃划痕可以是任意角度的
                    const length = 10 + Math.random() * 80;
                    const angle = Math.random() * Math.PI * 2;
                    context.lineTo(startX + Math.cos(angle) * length, startY + Math.sin(angle) * length);
                    context.stroke();
                }
                
                const texture = new THREE.CanvasTexture(canvas);
                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.RepeatWrapping;
                texture.repeat.set(4, 4); // 密集采样，使其变成极小的高频噪点
                return texture;
            }

            const brushedTex = generateBrushedTexture();
            const noiseTex = generateNoiseTexture();

            // 6. 材质定义
            // 真实PBR：拉丝质感银色金属盖 (引入增强的随机横向拉丝与颗粒瑕疵贴图)
            const brushedMetal = new THREE.MeshPhysicalMaterial({
                color: 0xeaf2fc, // 冰蓝色冷底色，彻底抵消任何环境暖光，确保呈现纯银/冷酷的生化感
                metalness: 1.0, // 纯金属
                roughness: 0.65, // 大幅提升基础粗糙度，产生高级的 blur 磨砂感
                roughnessMap: brushedTex, // 划痕处会有不同的粗糙度反光
                bumpMap: brushedTex, // 物理凹凸，让高光在横向纹理和噪点上产生真实的破碎感
                bumpScale: 0.008, // 大幅加深凹凸值，让金属表面的颗粒噪点和破损划痕更加粗糙显眼
                envMapIntensity: 2.0, // 调整反射强度，配合粗糙表面
                clearcoat: 0.2, // 增加微弱的表面磨砂清漆
                clearcoatRoughness: 0.5 // 清漆层非常粗糙，强化反光点被打散和 blur 的视觉效果
            });

            // 高透纯净玻璃：彻底重构 PBR 参数，解决所有泛白和雾面问题
            const clearGlass = new THREE.MeshPhysicalMaterial({
                color: 0xffffff, // 纯白透射
                metalness: 0.863, // 按截图设置
                roughness: 0.059, // 按截图设置
                transmission: 1.0, // 按截图设置
                ior: 1.703, // 按截图设置
                thickness: 0.483, // 按截图设置
                transparent: true,
                opacity: 0.406, // 按截图设置
                depthWrite: true, // 按截图设置开启
                depthTest: true, // 按截图设置开启
                side: THREE.BackSide, // 按截图设置
                envMapIntensity: 1.42, // 按截图设置
                clearcoat: 0.225, // 按截图设置
                clearcoatRoughness: 0.311, // 按截图设置
                specularIntensity: 0.92, // 按截图设置
                bumpScale: 0.0046 // 按截图设置
            });

            // 橡胶塞
            const rubber = new THREE.MeshStandardMaterial({
                color: 0x4E4E4E, // 极深灰色/近黑
                roughness: 0.1,  // 极度粗糙，吸收表面反光
                metalness: 0.0,  // 移除金属度，避免金属反光
                envMapIntensity: 0.1 // 【关键】大幅降低环境光反射，避免在高曝光的 HDRI 环境下被整体照亮泛灰
            });

            // 生化粉末质感 (实质的白色颗粒粉末)
            const whitePowder = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                roughness: 1.0, // 极度粗糙无反光
                metalness: 0.0,
                bumpMap: noiseTex, // 复用玻璃的微小瑕疵贴图来制造粉末表面的细微结块/凹凸颗粒感
                bumpScale: 0.2, // 放大凹凸值，形成清晰的物理粉末颗粒表面
                emissive: 0xffffff,
                emissiveIntensity: 1.0, // 加入强烈的自发光，突破有色玻璃的染色过滤
                envMapIntensity: 0.2 // 粉末几乎不反射环境
            });

            // ==========================================
            // 材质控制 (Material Controls)
            // ==========================================
            
            // 提前声明部件数组，供 UI 控制器在回调中访问
            let modelParts = {
                cap: [],
                glass: [],
                rubber: [],
                powder: [],
                label: [], // 全部标签网格（兼容）
                label1: [], // biaoqian1（不含 _2）
                label2: [] // biaoqian1_2
            };

            /* GUI_RESTORE_BLOCK_B 材质 folders（须与 BLOCK_A 同时恢复）

                function generateCylindricalUV2(geometry) {

                    const pos = geometry.attributes.position;
                    const count = pos.count;
                    const uv2 = new Float32Array(count * 2);
                    
                    geometry.computeBoundingBox();

                        }
                    });
                    bindMotionBlurEnterTimeline(entranceTl, blurParams, blurFilter);
                    entranceTl.to(modelPivot.position, {
                        x: 0,
                        y: 0,
                        z: 0,
                        duration: entranceDur,
                        ease: 'power2.inOut'
                    }, 0);
                    entranceTl.to(modelPivot.rotation, {
                        x: 0,
                        y: 0,
                        z: 0,
                        duration: entranceDur,
                        ease: 'power2.inOut'
                    }, 0);
                }

                function onWheelEntranceGate(e) {
                    if (entranceAnimating) {
                        e.preventDefault();
                        return;
                    }
                    if (!entered && e.deltaY > 0) {
                        e.preventDefault();
                        runEntranceIn();
                    }
                }
                window.addEventListener('wheel', onWheelEntranceGate, { passive: false });

                // HDRI 上下旋转动画：营造光线在模型上扫过的质感
                // 从 -Math.PI 到 Math.PI (360度完整旋转)，首尾相接，持续匀速循环扫描
                scene.environmentRotation.x = -Math.PI;
                gsap.to(scene.environmentRotation, {
                    x: Math.PI,
                    duration: 16.0, // 扫完一整圈的时长，放慢显得更有质感
                    ease: "none", // 必须改为匀速 (none/linear)，这样循环重新开始时速度才不会有卡顿感
                    repeat: -1, // 无限循环
                    yoyo: false, // 取消钟摆式的来回，只朝一个方向转，转满一圈后自动跳回 -Math.PI 继续
                    onUpdate: () => {
                        // 同步更新UI
                        if (envSettings && gui) {
                            envSettings.rotationX = scene.environmentRotation.x;
                            // 让 UI 控件显示也跟着动
                            const controllers = gui.controllersRecursive();
                            controllers.forEach(c => {
                                if (c.property === 'rotationX') c.updateDisplay();
                            });
                        }
                    }
                });
                
                // 隐藏加载UI
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.style.opacity = '0';
                    setTimeout(() => loading.style.display = 'none', 500);
                }

            }, undefined, function (error) {
                console.error(error);
                const loading = document.getElementById('loading');
                if (loading) loading.innerText = ''; // 去除错误时的文字提示
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            // 控制器更新，包括阻尼
            controls.update();

            // 自行实现的 autoRotate：如果开启且用户没有在拖拽也没有在自动复位中
            if (window._autoRotateSettings && window._autoRotateSettings.enabled && !window._autoRotateSettings.isDragging() && !window._autoRotateSettings.isResetting()) {
                // TrackballControls 下，我们可以通过基于相机 up 轴旋转 position 和 up 来实现模型旋转的错觉
                // autoRotateSpeed 保持和 OrbitControls 一致的行为感觉 (-0.8 代表每帧较慢的旋转)
                const speed = window._autoRotateSettings.speed * 0.002;
                
                // 绕着 Y 轴旋转相机
                const axis = new THREE.Vector3(0, 1, 0);
                camera.position.applyAxisAngle(axis, speed);
                camera.up.applyAxisAngle(axis, speed);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
