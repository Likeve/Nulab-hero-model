<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 西林瓶 - 纯模型版</title>
    <style>
        html {
            background: #000000;
            overflow: hidden; /* 隐藏原生滚动条，采用虚拟滚动接管交互 */
        }
        body {
            margin: 0;
            overflow: hidden; /* 隐藏原生滚动条 */
            background: #000000;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        .hero-section {
            width: 100%;
            max-width: none;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            height: 100vh;
            padding: 0;
            box-sizing: border-box;
            position: fixed; /* 固定画布，让滚动仅用来驱动时间轴 */
            top: 0;
            left: 0;
            background: #000000;
            z-index: 0;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            max-width: 100%;
            position: relative;
            cursor: grab;
            background: #000000;
        }
        #canvas-container:active {
            cursor: grabbing;
        }
        /* 平板：≤810px */
        @media (max-width: 810px) {
            .hero-section {
                min-height: 100dvh;
                height: 100dvh;
            }
            #canvas-container {
                touch-action: pan-y pinch-zoom;
            }
        }
        #error-log {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(255,0,0,0.8);
            color: white;
            z-index: 9999;
            font-family: monospace;
            padding: 10px;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>
    <div class="hero-section">
        <div id="canvas-container"></div>
    </div>
    <div id="error-log"></div>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            document.getElementById('error-log').style.display = 'block';
            document.getElementById('error-log').innerHTML += '<br>' + msg;
            return false;
        };
    </script>

    <!-- 引入 GSAP 动画库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <!-- 引入 lil-gui 用于控制参数 -->
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.1/dist/lil-gui.umd.min.js"></script>

    <!-- Import maps polyfill for older browsers -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TrackballControls } from 'three/addons/controls/TrackballControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        /** 与 import map 中 three 版本一致；Draco 压缩的 glTF/GLB 需从此路径加载 wasm/js 解码器 */
        const DRACO_DECODER_BASE = 'https://unpkg.com/three@0.164.0/examples/jsm/libs/draco/gltf/';

        let camera, scene, renderer, controls;

        // 设置默认触摸行为为允许垂直滚动
        document.body.style.touchAction = 'pan-y pinch-zoom';

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            // 1. 初始化渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setClearColor(0x000000, 1);
            
            // 色调映射与曝光，营造高级摄影质感
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 7.0;
            
            // 启用阴影
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.domElement.style.display = 'block';
            renderer.domElement.style.background = '#000000';
            container.appendChild(renderer.domElement);

            // 2. 场景设置
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            
            // 3. 相机设置 - 略带长焦感(35mm)，减少透视畸变，更显严谨和冷静
            camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 0, 8);

            // 4. 环境光与反射 (切换为暗调偏柔和的摄影棚 HDRI)
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            pmremGenerator.compileEquirectangularShader();
            
            // 环境光配置 (需要提前定义以便加载器访问)
            const envSettings = {
                rotationX: 0,
                rotationY: 0,
                enableHDRI: true
            };

            let envMapTexture = null;
            // parking_garage_1k.hdr：仓库内为 512×256 Radiance（由 1k 压缩，利于 Vercel/embed 下载）
            new RGBELoader()
                .setDataType(THREE.FloatType)
                .load('parking_garage_1k.hdr', function (texture) {
                    // 黑科技：在内存中强行将 HDR 转换为黑白，消除米黄色光害
                    const data = texture.image.data;
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                        data[i] = lum;
                        data[i + 1] = lum;
                        data[i + 2] = lum;
                    }
                    texture.needsUpdate = true;

                    envMapTexture = pmremGenerator.fromEquirectangular(texture).texture;
                    if (envSettings.enableHDRI) {
                        scene.environment = envMapTexture;
                    }
                    
                    // 适当提升曝光度，确保在暗调环境下能清晰看清标签上的文字，同时保持整体深邃感
                    renderer.toneMappingExposure = 7.0; 

                    // 释放内存
                    texture.dispose();
                    pmremGenerator.dispose();
                });
            
            // 优化摄影棚布光：大幅提亮环境补光，解决阴影区死黑的问题
            // 天光保持纯白，地面反光颜色从极暗的 0x111111 提亮到中灰色 0x666666，强度提升到 1.5，让暗部细节透出来
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x666666, 1.5); 
            scene.add(hemiLight);
            hemiLight.visible = false; // 默认关闭底部补光，需要时在面板「底部补光」中开启

            // 添加一盏微弱的正面主光源，专门用来照亮正面标签上的文字 (改为聚光灯以便控制范围)
            const frontLight = new THREE.SpotLight(0xffffff, 1.2);
            frontLight.position.set(0, 0, 5); // 从正前方打光
            frontLight.angle = Math.PI / 3; // 默认照射角度/范围
            frontLight.penumbra = 0.5; // 边缘模糊/柔和度
            frontLight.distance = 20; // 照射距离
            scene.add(frontLight);

            // 添加一盏用于“扫光”效果的强点光源（点光源更容易在金属和玻璃上形成明显的高光移动）
            const sweepLight = new THREE.PointLight(0xffffff, 0, 30); // 初始亮度为 0，照射距离为 30
            sweepLight.position.set(-10, 0, 2.5); // 初始在左侧，稍微靠近瓶身前方以产生强反射
            scene.add(sweepLight);

            // 再额外增加一个微弱的全局环境光，作为最终托底，确保无论怎么转都不会有纯黑的死角
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            // 5. 交互控制器 (TrackballControls，实现全方位无死角斜向自由拖拽，就像把玩实物一样)
            controls = new TrackballControls(camera, renderer.domElement);
            controls.rotateSpeed = 3.0;
            controls.noZoom = true; // 禁止缩放
            controls.noPan = true; // 禁止平移
            controls.staticMoving = false; // 关闭静态移动，也就是开启阻尼顺滑效果
            controls.dynamicDampingFactor = 0.04; // 阻尼力度
            
            // 确保画布允许垂直滚动
            renderer.domElement.style.touchAction = 'pan-y pinch-zoom';

            // 由于 TrackballControls 默认没有 autoRotate，我们自己接管自动旋转逻辑
            let isDragging = false;
            let isResetting = false;
            let resetTweenPos = null;
            let resetTweenUp = null;

            // === 移动端/触屏交互优化：严格分离【横向旋转模型】与【纵向滚动时间轴】 ===
            let _pointerStartX = 0;
            let _pointerStartY = 0;
            let _gestureDirection = null; // 'horizontal' | 'vertical' | null
            window._isHorizontalSwipe = false;

            renderer.domElement.addEventListener('pointerdown', (e) => {
                if (e.pointerType === 'touch') {
                    _pointerStartX = e.clientX;
                    _pointerStartY = e.clientY;
                    _gestureDirection = null;
                    window._isHorizontalSwipe = false;
                }
            }, { capture: true });

            renderer.domElement.addEventListener('pointermove', (e) => {
                if (e.pointerType === 'touch') {
                    if (!_gestureDirection) {
                        const dx = Math.abs(e.clientX - _pointerStartX);
                        const dy = Math.abs(e.clientY - _pointerStartY);
                        if (dx > 5 || dy > 5) {
                            _gestureDirection = dx > dy ? 'horizontal' : 'vertical';
                        }
                    }
                    
                    if (_gestureDirection === 'vertical') {
                        // 如果是上下滑（意图滚动），阻止 TrackballControls 获取事件，避免把模型转飞
                        e.stopImmediatePropagation();
                    } else if (_gestureDirection === 'horizontal') {
                        // 如果是左右滑（意图旋转模型），通知外层拦截器不要滚动虚拟时间轴
                        window._isHorizontalSwipe = true;
                    }
                }
            }, { capture: true });

            const resetSwipeState = (e) => {
                if (e.pointerType === 'touch') {
                    window._isHorizontalSwipe = false;
                }
            };
            renderer.domElement.addEventListener('pointerup', resetSwipeState, { capture: true });
            renderer.domElement.addEventListener('pointercancel', resetSwipeState, { capture: true });
            renderer.domElement.addEventListener('pointerout', resetSwipeState, { capture: true });
            renderer.domElement.addEventListener('pointerleave', resetSwipeState, { capture: true });
            // ==============================================================

            controls.addEventListener('start', () => { 
                isDragging = true; 
                isResetting = false;
                if (resetTweenPos) resetTweenPos.kill();
                if (resetTweenUp) resetTweenUp.kill();
            });

            controls.addEventListener('end', () => { 
                isDragging = false; 
                isResetting = true;

                // 释放鼠标后，使用 GSAP 平滑地将相机恢复到默认初始状态
                let dummy = { t: 0 };
                let startPos = camera.position.clone();
                let targetPos = new THREE.Vector3(0, 0, 8); // 默认初始位置
                let startUp = camera.up.clone();
                let targetUp = new THREE.Vector3(0, 1, 0);  // 默认向上的向量
                let radius = startPos.length(); // 保持拖拽时的当前半径

                resetTweenPos = gsap.to(dummy, {
                    t: 1,
                    duration: 2.5, // 回弹时间延长，动作更缓慢优雅
                    ease: "power4.out", 
                    onUpdate: () => {
                        camera.position.copy(startPos).lerp(targetPos, dummy.t).normalize().multiplyScalar(radius);
                        camera.up.copy(startUp).lerp(targetUp, dummy.t).normalize();
                        camera.lookAt(0, 0, 0);
                    },
                    onComplete: () => { isResetting = false; }
                });
            });
            
            // 将 autoRotate 状态暴露给全局，方便在 animate 中访问（瓶身绕自身局部 Y 自转，不再旋转相机）
            window._heroBottleRoot = null; // GLB 根节点，加载完成后赋值
            window._autoRotateSettings = {
                enabled: true,
                speed: -0.8,
                isDragging: () => isDragging,
                isResetting: () => isResetting
            };

            // ==========================================
            // 调试面板 (lil-gui)
            // ==========================================
            let gui = new lil.GUI({ title: '光照与环境控制' });
            gui.hide(); // 隐藏 UI 面板
            
            // 全局曝光
            gui.add(renderer, 'toneMappingExposure', 0, 10).name('全局曝光度 (Exposure)');

            // 环境光旋转 (HDRI)
            const envFolder = gui.addFolder('HDRI 环境光 (Environment)');
            envFolder.add(envSettings, 'enableHDRI').name('开启 HDRI').onChange((val) => {
                if (val && envMapTexture) {
                    scene.environment = envMapTexture;
                } else {
                    scene.environment = null;
                }
            });
            envFolder.add(envSettings, 'rotationY', -Math.PI, Math.PI).name('HDRI 水平旋转').onChange((val) => {
                scene.environmentRotation.y = val;
            });
            envFolder.add(envSettings, 'rotationX', -Math.PI, Math.PI).name('HDRI 上下旋转').onChange((val) => {
                scene.environmentRotation.x = val;
            });

            // 底部补光 (HemisphereLight)
            const hemiFolder = gui.addFolder('底部补光 (HemiLight)');
            hemiFolder.add(hemiLight, 'visible').name('开启/关闭');
            hemiFolder.add(hemiLight, 'intensity', 0, 5).name('强度');
            
            // 正面主光 (SpotLight)
            const dirFolder = gui.addFolder('正面主光 (FrontLight)');
            dirFolder.add(frontLight, 'visible').name('开启/关闭');
            dirFolder.add(frontLight, 'intensity', 0, 5).name('光照强度');
            dirFolder.add(frontLight, 'angle', 0, Math.PI / 2).name('光照范围/角度 (Angle)');
            dirFolder.add(frontLight, 'penumbra', 0, 1).name('光照边缘模糊 (Penumbra)');
            dirFolder.add(frontLight, 'distance', 0, 50).name('照射最远距离');
            dirFolder.add(frontLight.position, 'x', -10, 10).name('位置 X');
            dirFolder.add(frontLight.position, 'y', -10, 10).name('位置 Y');
            dirFolder.add(frontLight.position, 'z', -10, 10).name('位置 Z');
            
            // 全局基础托底光 (AmbientLight)
            const ambFolder = gui.addFolder('全局兜底光 (AmbientLight)');
            ambFolder.add(ambientLight, 'visible').name('开启/关闭');
            ambFolder.add(ambientLight, 'intensity', 0, 2).name('强度');

            // 视频录制 (Video Recording)
            const recFolder = gui.addFolder('🎥 视频导出 (Video Export)');
            const recState = {
                record10s: function() {
                    if (window._isRecording) {
                        alert("正在录制中，请稍后...");
                        return;
                    }
                    window._isRecording = true;
                    
                    // 重置动画
                    if (window._entranceTl) {
                        window._entranceTl.pause();
                        window._entranceTl.time(0);
                    }
                    if (window._heroBottleRoot) {
                        window._heroBottleRoot.rotation.y = 0;
                    }
                    if (window._autoRotateSettings) {
                        window._autoRotateSettings.enabled = false;
                    }

                    // 开始录制 (120fps)
                    const stream = renderer.domElement.captureStream(120); 
                    let options = { videoBitsPerSecond: 100000000 };
                    let mediaRecorder;
                    try {
                        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9', ...options });
                    } catch (e) {
                        try {
                            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/mp4', ...options });
                        } catch (e2) {
                            mediaRecorder = new MediaRecorder(stream, options);
                        }
                    }
                    
                    const chunks = [];
                    mediaRecorder.ondataavailable = e => {
                        if (e.data.size > 0) chunks.push(e.data);
                    };
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'video/webm' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        // 后缀名判断
                        const ext = (mediaRecorder.mimeType && mediaRecorder.mimeType.includes('mp4')) ? 'mp4' : 'webm';
                        a.download = `3d-bottle-animation-10s-120fps.${ext}`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        window._isRecording = false;
                        document.title = '3D 西林瓶 - 纯模型版';
                        alert('✅ 录制完成！视频已下载。');
                    };
                    
                    mediaRecorder.start();
                    document.title = '🔴 正在录制 10秒 视频...';
                    
                    // 重启 GSAP 动画时间轴
                    if (window._entranceTl) {
                        window._entranceTl.restart();
                    }
                    
                    // 10秒后停止
                    setTimeout(() => {
                        if (mediaRecorder.state !== "inactive") {
                            mediaRecorder.stop();
                        }
                    }, 10000); 
                }
            };
            recFolder.add(recState, 'record10s').name('⏺️ 点击录制 10秒 动画视频');

            function generateBrushedTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 1024;
                canvas.height = 1024;
                const context = canvas.getContext('2d');
                
                context.fillStyle = '#808080';
                context.fillRect(0, 0, 1024, 1024);
                
                for (let i = 0; i < 8000; i++) {
                    const isLight = Math.random() > 0.5;
                    const alpha = Math.random() * 0.12; 
                    context.fillStyle = isLight ? `rgba(255,255,255,${alpha})` : `rgba(0,0,0,${alpha})`;
                    
                    const y = Math.random() * 1024;
                    const x = Math.random() * 1024;
                    const width = 200 + Math.random() * 800; 
                    const height = Math.random() * 1.5; 
                    
                    context.fillRect(x, y, width, height);
                }

                for (let i = 0; i < 15000; i++) {
                    const isLight = Math.random() > 0.5;
                    const alpha = Math.random() * 0.15; 
                    context.fillStyle = isLight ? `rgba(255,255,255,${alpha})` : `rgba(0,0,0,${alpha})`;
                    
                    const y = Math.random() * 1024;
                    const x = Math.random() * 1024;
                    const width = 5 + Math.random() * 40; 
                    const height = Math.random() * 2.0; 
                    
                    context.fillRect(x, y, width, height);
                }

                for (let i = 0; i < 30000; i++) {
                    const isLight = Math.random() > 0.5;
                    const alpha = Math.random() * 0.18; 
                    context.fillStyle = isLight ? `rgba(255,255,255,${alpha})` : `rgba(0,0,0,${alpha})`;
                    
                    const y = Math.random() * 1024;
                    const x = Math.random() * 1024;
                    const size = Math.random() * 1.5; 
                    
                    context.fillRect(x, y, size, size);
                }

                for (let i = 0; i < 400; i++) {
                    const isLight = Math.random() > 0.5;
                    const alpha = Math.random() * 0.3; 
                    context.strokeStyle = isLight ? `rgba(255,255,255,${alpha})` : `rgba(0,0,0,${alpha})`;
                    context.lineWidth = Math.random() * 2.0; 
                    
                    context.beginPath();
                    const startX = Math.random() * 1024;
                    const startY = Math.random() * 1024;
                    context.moveTo(startX, startY);
                    
                    const length = 10 + Math.random() * 150;
                    const angle = (Math.random() - 0.5) * 0.6; 
                    context.lineTo(startX + Math.cos(angle) * length, startY + Math.sin(angle) * length);
                    context.stroke();
                }
                
                const texture = new THREE.CanvasTexture(canvas);
                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.RepeatWrapping;
                texture.repeat.set(4, 2); 
                return texture;
            }

            function generateNoiseTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 512;
                canvas.height = 512;
                const context = canvas.getContext('2d');
                
                context.fillStyle = '#808080';
                context.fillRect(0, 0, 512, 512);
                
                for (let i = 0; i < 40000; i++) {
                    const isLight = Math.random() > 0.5;
                    const alpha = Math.random() * 0.15; 
                    context.fillStyle = isLight ? `rgba(255,255,255,${alpha})` : `rgba(0,0,0,${alpha})`;
                    
                    const y = Math.random() * 512;
                    const x = Math.random() * 512;
                    const size = Math.random() * 1.5; 
                    
                    context.fillRect(x, y, size, size);
                }

                for (let i = 0; i < 300; i++) {
                    const alpha = Math.random() * 0.25; 
                    context.strokeStyle = `rgba(255,255,255,${alpha})`; 
                    context.lineWidth = 0.5 + Math.random() * 1.5; 
                    
                    context.beginPath();
                    const startX = Math.random() * 512;
                    const startY = Math.random() * 512;
                    context.moveTo(startX, startY);
                    
                    const length = 10 + Math.random() * 80;
                    const angle = Math.random() * Math.PI * 2;
                    context.lineTo(startX + Math.cos(angle) * length, startY + Math.sin(angle) * length);
                    context.stroke();
                }
                
                const texture = new THREE.CanvasTexture(canvas);
                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.RepeatWrapping;
                texture.repeat.set(4, 4); 
                return texture;
            }

            const brushedTex = generateBrushedTexture();
            const noiseTex = generateNoiseTexture();

            const brushedMetal = new THREE.MeshPhysicalMaterial({
                color: 0xeaf2fc, 
                metalness: 1.0, 
                roughness: 0.65, 
                roughnessMap: brushedTex, 
                bumpMap: brushedTex, 
                bumpScale: 0.008, 
                envMapIntensity: 2.0, 
                clearcoat: 0.2, 
                clearcoatRoughness: 0.5 
            });

            const clearGlass = new THREE.MeshPhysicalMaterial({
                color: 0xffffff, 
                metalness: 0.863, 
                roughness: 0.059, 
                transmission: 1.0, 
                ior: 1.703, 
                thickness: 0.483, 
                transparent: true,
                opacity: 0.406, 
                depthWrite: true, 
                depthTest: true, 
                side: THREE.BackSide, 
                envMapIntensity: 1.42, 
                clearcoat: 0.225, 
                clearcoatRoughness: 0.311, 
                specularIntensity: 0.92, 
                bumpScale: 0.0046 
            });

            const rubber = new THREE.MeshStandardMaterial({
                color: 0x4E4E4E, 
                roughness: 0.1,

                    );
                const edgePadPx = window.innerWidth <= 390 ? 72 : window.innerWidth <= 810 ? 120 : 160;
                const edgePadding = pxToWorldX(edgePadPx);
                const startX = 0; // 取消从左侧飞入，保持在屏幕正中心

                modelPivot.position.set(startX, 0, 0);
                modelPivot.rotation.set(
                    THREE.MathUtils.degToRad(56),
                    THREE.MathUtils.degToRad(-157),
                    THREE.MathUtils.degToRad(104)
                );
                model.rotation.set(0, 0, 0);

                function generateCylindricalUV2(geometry) {
                    if (!geometry.attributes.position) return;
                    const pos = geometry.attributes.position;
                    const count = pos.count;
                    const uv2 = new Float32Array(count * 2);
                    
                    geometry.computeBoundingBox();
                    const min = geometry.boundingBox.min;
                    const max = geometry.boundingBox.max;
                    const height = (max.y - min.y) || 1;
                    
                    for (let i = 0; i < count; i++) {
                        const x = pos.getX(i);
                        const y = pos.getY(i);
                        const z = pos.getZ(i);
                        
                        const theta = Math.atan2(z, x); 
                        let u = (theta + Math.PI) / (2 * Math.PI); 
                        let v = (y - min.y) / height; 
                        
                        uv2[i * 2] = u;
                        uv2[i * 2 + 1] = v;
                    }
                    
                    geometry.setAttribute('uv1', new THREE.BufferAttribute(uv2, 2));
                }

                function setupLabelMeshMaterial(child) {
                    generateCylindricalUV2(child.geometry);

                    if (!child.material) return;
                    const brushedForLabel = brushedTex.clone();
                    brushedForLabel.channel = 1; 
                    brushedForLabel.needsUpdate = true;
                    
                    const noiseForLabel = noiseTex.clone();
                    noiseForLabel.channel = 1; 
                    noiseForLabel.needsUpdate = true;
                    noiseForLabel.repeat.set(2, 2);

                // ==========================================

                    const mapTexFolder = labelFolder.addFolder('Logo 底图 (map)');
                    const maxAniso = Math.min(16, renderer.capabilities.getMaxAnisotropy ? renderer.capabilities.getMaxAnisotropy() : 16);

                        offsetX: lm0.map ? lm0.map.offset.x : 0,

                        repeatX: lm0.map ? lm0.map.repeat.x : 1,

                    };

                    function applyMapUV() {
                        forMat((m) => {
                            const t = m.map;
                            if (!t) return;
                            t.offset.set(mapSettings.offsetX, mapSettings.offsetY);
                            t.repeat.set(mapSettings.repeatX, mapSettings.repeatY);

                            t.anisotropy = mapSettings.anisotropy;
                            t.needsUpdate = true;

                    ease: 'power2.inOut'
                }, 0);

                // “扫光”效果：在入场动画快要结束时（提前 1 秒）开始扫光
                const sweepDur = 1.2;
                const sweepStart = Math.max(0, unifiedDur - 1.0);
                
                // 扫光的位移：从左边 (-10) 移动到右边 (10)
                entranceTl.to(sweepLight.position, {
                    x: 10,
                    duration: sweepDur,
                    ease: 'power1.inOut'
                }, sweepStart);
                
                // 扫光的亮度：快速亮起 然后渐暗 (回 0)
                entranceTl.to(sweepLight, {
                    intensity: 5.0,
                    duration: sweepDur * 0.4,
                    ease: 'power1.out'
                }, sweepStart);
                
                entranceTl.to(sweepLight, {
                    intensity: 0,
                    duration: sweepDur * 0.6,
                    ease: 'power1.in'
                }, sweepStart + sweepDur * 0.4);

                // 在缩放、旋转复位以及“扫光”都结束后，等待 1 秒，然后再开启自转
                entranceTl.call(function() {
                    if (window._autoRotateSettings) {
                        window._autoRotateSettings.enabled = true;
                    }
                }, null, "+=1.0");

                scene.environmentRotation.x = -Math.PI;
                gsap.to(scene.environmentRotation, {
                    x: Math.PI,
                    duration: 16.0, 
                    ease: "none", 
                    repeat: -1, 
                    yoyo: false, 
                    onUpdate: () => {
                        if (envSettings && gui) {
                            envSettings.rotationX = scene.environmentRotation.x;
                            const controllers = gui.controllersRecursive();
                            controllers.forEach(c => {
                                if (c.property === 'rotationX') c.updateDisplay();
                            });
                        }
                    }
                });

            }, undefined, function (error) {
                console.error(error);
                dracoLoader.dispose();
                const errDiv = document.createElement('div');
                errDiv.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:white;font-family:sans-serif;text-align:center;';
                errDiv.innerHTML = '<h2>加载模型失败</h2><p>如果您是直接双击打开的 HTML 文件，<br>浏览器安全策略(CORS)会阻止加载本地 GLB 模型。<br>请使用 VS Code 的 Live Server 插件打开，或者部署到 Vercel 后查看。</p>';
                document.body.appendChild(errDiv);
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            const bottle = window._heroBottleRoot;
            if (
                bottle &&
                window._autoRotateSettings &&
                window._autoRotateSettings.enabled &&
                !window._autoRotateSettings.isDragging() &&
                !window._autoRotateSettings.isResetting()
            ) {
                const speed = window._autoRotateSettings.speed * 0.002;
                bottle.rotation.y += speed;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
